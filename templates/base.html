<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="stylesheet" href="{{ css_href }}">
    <title>{% block title %}Soomei{% endblock %}</title>
  </head>
  <body>
    <main class="wrap">
      {% block content %}{% endblock %}
    </main>
    <footer class="muted site-footer soomei-footer-mark">
      <a class="soomei-watermark" href="https://soomei.cc" target="_blank" rel="noopener" aria-label="Soomei">
        <span class="soomei-watermark__brand">Soomei</span>
        <span class="soomei-watermark__text">cartão digital</span>
      </a>
      <span class="footer-auth-slot"></span>
    </footer>
    {% block scripts %}{% endblock %}
  </body>
  </html>
