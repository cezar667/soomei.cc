{% extends "base.html" %}
{% block title %}Entrar{% endblock %}
{% block content %}
  <section class="login-shell">
    <div class="carbon login-card">
      <img src="/static/img/soomei_logo.png" alt="Soomei" class="login-logo">
      <div class="login-body">
        <h1>Entrar na Soomei</h1>
        <p class="muted">Acesse seu painel e atualize seu cartão digital.</p>
        <form method="post" action="/auth/login" class="login-form">
          <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
          <input type="hidden" name="uid" value="{{ uid }}">
          <label for="loginEmail">Email</label>
          <input id="loginEmail" name="email" type="email" required placeholder="voce@empresa.com" autocomplete="email">
          <label for="loginPassword">Senha</label>
          <input id="loginPassword" name="password" type="password" required placeholder="Sua senha" autocomplete="current-password">
          <button class="btn primary login-btn">Entrar</button>
        </form>
        <p><a class="muted" href="/auth/forgot">Esqueceu a senha?</a></p>
        {% if error and error|trim %}
        <div id="formAlert" class="banner" role="alert" aria-live="polite">{{ error }}</div>
        {% else %}
        <div id="formAlert" class="banner hidden" role="alert" aria-live="polite"></div>
        {% endif %}
      </div>
    </div>
  </section>
{% endblock %}
